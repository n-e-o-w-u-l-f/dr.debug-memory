libraries:
  - id: "cdnjs"
    name: "cdnjs"
    cdnjs_name: null
    latest_version_observed: null
    license_note: "Service hosts open-source libraries; individual library licenses must be checked per package."
    official_url: "https://cdnjs.com/"
    cdnjs_url: "https://cdnjs.com/"
    purpose: "Public CDN and API for JavaScript/CSS library discovery and asset delivery."
    selected: "SOURCE_PROVIDER_ONLY"
    use_for_stammbaum: "Use as discovery/source-record provider, not as canonical truth. Pin exact library versions and SRI hashes where CDN is used."
    risk: "Third-party runtime dependency; outage/CDN policy/CORS/SRI/version drift risks."
    security_note: "Pin versions, prefer Subresource Integrity, set crossorigin, keep local fallback for critical UI."
    accessibility_note: "Not directly relevant; hosted scripts must preserve keyboard/no-JS fallback."
    bundle_size_note: "Depends on chosen library; use CDNJS API assets/SRI metadata to record exact files."
  - id: "jekyll"
    name: "Jekyll"
    cdnjs_name: "not_a_cdnjs_browser_script"
    latest_version_observed: null
    license_note: "MIT on official Jekyll website; GitHub Pages supports Jekyll static site generation."
    official_url: "https://jekyllrb.com/"
    cdnjs_url: null
    purpose: "Static site generation using Markdown/HTML/Liquid and data files."
    selected: true
    use_for_stammbaum: "Keep as base architecture. Render the tree from _data/stammbaum.yml/json and Liquid includes; enhance progressively with JS."
    risk: "Build-time dependency and GitHub Pages plugin constraints."
    security_note: "No browser execution by itself; keep generated output static and avoid unsafe plugins."
    accessibility_note: "Excellent fallback because server/build-rendered HTML remains readable without JavaScript."
    bundle_size_note: "No client bundle unless separate JS/CSS is added."
  - id: "bootstrap"
    name: "Bootstrap / twitter-bootstrap"
    cdnjs_name: "twitter-bootstrap"
    latest_version_observed: "5.3.8"
    license_note: "MIT according to cdnjs."
    official_url: "https://getbootstrap.com/"
    cdnjs_url: "https://cdnjs.com/libraries/twitter-bootstrap"
    purpose: "Responsive CSS/layout/components; optional JavaScript plugins."
    selected: "LIMITED_TRUE"
    use_for_stammbaum: "Keep/use Bootstrap CSS for toolbar/buttons/grid if already present. Use bootstrap.bundle.min.js only if dropdowns/modal/tooltips are needed."
    risk: "Unneeded JS weight if only CSS utility classes are used."
    security_note: "Prefer CSS-only use; if JS used, pin 5.3.8 + SRI and avoid plugin-driven content injection."
    accessibility_note: "Bootstrap components can be accessible when used as documented, but custom tree semantics still require aria-expanded/focus handling."
    bundle_size_note: "Use css/bootstrap.min.css and only bootstrap.bundle.min.js when Popper-dependent UI is required."
  - id: "jquery"
    name: "jQuery"
    cdnjs_name: "jquery"
    latest_version_observed: "3.7.1 stable on cdnjs page/API assets; API versions include 4.0.0 RC entries"
    license_note: "MIT according to cdnjs."
    official_url: "https://jquery.com/"
    cdnjs_url: "https://cdnjs.com/libraries/jquery"
    purpose: "DOM operations, event handling, AJAX/effects in full build; slim build excludes AJAX/effects/deprecated code."
    selected: false
    use_for_stammbaum: "Do not add for new Stammbaum code. Use native DOM APIs. Only add if a chosen plugin, such as jsTree, forces it."
    risk: "Extra dependency, possible transitive plugin lock-in; slim/full confusion."
    security_note: "Avoid legacy plugins; if used, pin exact stable version and SRI."
    accessibility_note: "No direct accessibility benefit; custom UI still needs semantic HTML/ARIA."
    bundle_size_note: "Full build heavier than native code for simple expand/collapse."
  - id: "animate_css"
    name: "Animate.css"
    cdnjs_name: "animate.css"
    latest_version_observed: "4.1.1"
    license_note: "MIT according to cdnjs."
    official_url: "https://animate.style/"
    cdnjs_url: "https://cdnjs.com/libraries/animate.css"
    purpose: "CSS animation utility classes."
    selected: "OPTIONAL"
    use_for_stammbaum: "Optional only for simple fades/emphasis. Prefer custom CSS transitions for NFO fade and branch open/close."
    risk: "Animation overuse, motion sensitivity, extra CSS."
    security_note: "CSS-only, low script risk; still pin exact version if CDN used."
    accessibility_note: "Must respect prefers-reduced-motion and avoid color/motion-only meaning."
    bundle_size_note: "May be unnecessary if only two or three local animations are needed."
  - id: "vue"
    name: "Vue.js"
    cdnjs_name: "vue"
    latest_version_observed: "3.5.22"
    license_note: "MIT according to cdnjs."
    official_url: "https://vuejs.org/"
    cdnjs_url: "https://cdnjs.com/libraries/vue"
    purpose: "Reactive UI framework."
    selected: false
    use_for_stammbaum: "Do not add for baseline Jekyll Stammbaum. Consider only if the tree becomes a full interactive application with complex state."
    risk: "Framework weight and duplicated rendering with Jekyll/Liquid."
    security_note: "Avoid runtime template injection."
    accessibility_note: "Framework does not solve tree keyboard/ARIA by itself."
    bundle_size_note: "Larger than the required Vanilla JS behavior."
  - id: "pixi_js"
    name: "PixiJS / pixi.js"
    cdnjs_name: "pixi.js"
    latest_version_observed: "8.14.0"
    license_note: "MIT according to cdnjs."
    official_url: "https://pixijs.com/"
    cdnjs_url: "https://cdnjs.com/libraries/pixi.js"
    purpose: "WebGL/canvas rendering and particle/effects layer."
    selected: "OPTIONAL_EFFECTS_ONLY"
    use_for_stammbaum: "Optional decorative branch particles/animated arms, gated behind effects toggle and reduced-motion checks. Never primary renderer."
    risk: "GPU/performance cost, accessibility gap if used for content."
    security_note: "Pin exact version/SRI if CDN loaded; do not load for users with reduced motion or low-performance mode."
    accessibility_note: "Canvas content is not accessible; maintain DOM tree as canonical visible content."
    bundle_size_note: "Heavy for decoration; lazy-load only."
  - id: "pdf_js"
    name: "PDF.js"
    cdnjs_name: "pdf.js"
    latest_version_observed: "5.4.149"
    license_note: "Apache-2.0 according to cdnjs."
    official_url: "https://mozilla.github.io/pdf.js/"
    cdnjs_url: "https://cdnjs.com/libraries/pdf.js"
    purpose: "PDF rendering in browser."
    selected: true
    use_for_stammbaum: "Lazy-load only when a PDF asset is opened. Configure worker path exactly. Prefer render into contained viewer panel."
    risk: "Large dependency, worker/CSP issues, malicious/large PDFs can be expensive to render."
    security_note: "Use current pinned version and SRI. Do not auto-open untrusted PDFs; keep links as links too."
    accessibility_note: "Canvas rendering alone is not fully accessible; provide file link/title and metadata."
    bundle_size_note: "Load only on demand."
  - id: "highlight_js"
    name: "highlight.js"
    cdnjs_name: "highlight.js"
    latest_version_observed: "11.11.1"
    license_note: "BSD-3-Clause according to cdnjs."
    official_url: "https://highlightjs.org/"
    cdnjs_url: "https://cdnjs.com/libraries/highlight.js"
    purpose: "Syntax highlighting for code snippets."
    selected: true
    use_for_stammbaum: "Lazy-load for code assets. Escape code as textContent before highlighting. Prefer a small language subset if self-hosting later."
    risk: "Over-highlighting untrusted HTML if not escaped first."
    security_note: "Never inject raw code via innerHTML before escaping; pin exact version/SRI."
    accessibility_note: "Preserve readable plain code; do not rely on colors only."
    bundle_size_note: "Use core/common build or selected language bundles if possible."
  - id: "nfoview_www"
    name: "nfoview-www"
    cdnjs_name: "not_found"
    latest_version_observed: null
    license_note: "Review required from upstream repository; not a CDNJS package in current research."
    official_url: "https://github.com/otsaloma/nfoview-www"
    cdnjs_url: null
    purpose: "Web NFO viewer / demonstration site related to nfoview."
    selected: false
    use_for_stammbaum: "Do not vendor or copy. Implement minimal internal escaped NFO text viewer; record upstream only as research reference."
    risk: "License/reuse uncertainty and unnecessary external code."
    security_note: "NFO content must be text-escaped; external links sanitized."
    accessibility_note: "Use preformatted text with readable font, scroll handling and contrast."
    bundle_size_note: "No CDNJS asset available."
  - id: "javafx"
    name: "JavaFX / OpenJFX"
    cdnjs_name: "not_a_browser_cdnjs_library"
    latest_version_observed: null
    license_note: "GPL+Classpath/open-source project; not relevant as CDNJS script."
    official_url: "https://openjfx.io/"
    cdnjs_url: null
    purpose: "Java rich-client UI platform for desktop/mobile/embedded Java applications."
    selected: false
    use_for_stammbaum: "Reject for browser/Jekyll. Could only be relevant for a separate desktop Dr.Debug client, not static web."
    risk: "Wrong runtime, build/distribution complexity."
    security_note: "Not applicable to static browser site."
    accessibility_note: "Java desktop accessibility is separate from web accessibility."
    bundle_size_note: "Not a client-side web bundle."
