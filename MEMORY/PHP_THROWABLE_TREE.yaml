tree_notes:
  - Throwable is the top-level interface for throwables in PHP 7+.
  - Exception and Error are the two main branches.
  - ErrorException is an Exception-based wrapper for selected reported errors; it is not the same branch as Error.
  - ParseError extends CompileError as of PHP 7.3.0; before PHP 7.3 it extended Error.
